services:
  db:
    image: postgres:16-alpine
    container_name: oak_db
    environment:
      POSTGRES_DB: oak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oak_api
    environment:
      # App server
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8000

      # DB config (used by common.conf.settings.PostgresSettings)
      POSTGRES_DRIVER: postgresql+asyncpg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_DB: oak
      POSTGRES_ECHO: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

